<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="position:relative; width:720px; height:1600px; background:#000; font-family:Inter,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; overflow:hidden;">

  <img src="assets/entry-bg.jpg" alt="" style="position:absolute; left:0; top:0; width:720px; height:1600px; object-fit:cover;">
  <div style="position:absolute; inset:0; background:rgba(0,0,0,0.3);"></div>

  <div style="position:absolute; left:0; bottom:0; width:720px; height:544px; border-radius:64px 64px 0 0; background:#fff; box-sizing:border-box; padding:80px 64px 0; display:flex; flex-direction:column; align-items:center; gap:24px;">
    <div style="width:592px; text-align:center; font-weight:600; font-size:40px; line-height:50px; letter-spacing:-0.02em; color:#000;">Too many that look the same?</div>
    <div style="width:448px; text-align:center; font-weight:500; font-size:24px; line-height:32px; letter-spacing:-0.01em; color:#8E9196;">Answer a few quick this-or-that's and we'll land on one.</div>
    <div onClick="{{ onStart }}" style="margin-top:16px; width:320px; height:80px; border-radius:16px; background:#F04F5F; display:flex; align-items:center; justify-content:center; cursor:{{ startCur }};">
      <span style="color:#fff; font-weight:600; font-size:32px; letter-spacing:-0.02em;">Start the duel</span>
    </div>
    <div style="margin-top:8px; width:392px; text-align:center; font-weight:500; font-size:32px; letter-spacing:-0.03em; color:#0A0A0A;">keep browsing</div>
  </div>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:720,&quot;height&quot;:1600}}">
class Component extends DCLogic {
  renderVals() {
    const p = this.props;
    return { onStart: p.onStart || (() => {}), startCur: p.onStart ? "pointer" : "default" };
  }
}
</script>
</body>
</html>
