<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="width:100%; height:100%; display:flex; flex-direction:column; gap:24px; padding:16px; box-sizing:border-box; border-radius:32px; background:#FFFFFF; box-shadow:inset 0 0 0 2px rgba(0,0,0,0.2), 0px 4px 12px -2px rgba(0,0,0,0.1); font-family:Inter,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">

  <div style="width:100%; height:248px; border-radius:24px; overflow:hidden; flex-shrink:0;">
    <img src="{{ img }}" alt="" style="width:100%; height:100%; object-fit:cover; display:block;">
  </div>

  <div style="display:flex; flex-direction:row; justify-content:space-between; align-items:flex-start; gap:16px;">
    <div style="display:flex; flex-direction:column; gap:8px; min-width:0;">
      <span style="font-weight:600; font-size:34px; line-height:40px; letter-spacing:-0.013em; color:#0A0A0A; white-space:nowrap;">{{ dish }}</span>
      <span style="font-weight:500; font-size:24px; line-height:28px; letter-spacing:-0.004em; color:#616A73; white-space:nowrap;">{{ restaurant }}</span>
      <div style="display:flex; flex-direction:row; gap:8px; align-items:center; color:#27835A; font-weight:600; font-size:20px; line-height:24px;">
        <svg width="14.583" height="29.167" viewBox="0 0 14.583 29.167" fill="#27835A" style="flex-shrink:0;"><path d="M 0 0 L 0 16.042 L 4.375 16.042 L 4.375 29.167 L 14.583 11.667 L 8.75 11.667 L 14.583 0 L 0 0 Z" fill-rule="nonzero"></path></svg>
        <span style="white-space:nowrap;">{{ time }}</span>
        <span style="margin:0 8px;">|</span>
        <span style="white-space:nowrap;">{{ dist }}</span>
        <span style="white-space:nowrap;">• Free</span>
      </div>
      <span style="font-weight:700; font-size:32px; line-height:32px; letter-spacing:-0.020em; color:#070707; margin-top:8px;">{{ price }}</span>
    </div>

    <div style="display:flex; flex-direction:column; gap:8px; align-items:center; flex-shrink:0;">
      {{ ratingEl }}
      <span style="font-weight:500; font-size:20px; line-height:24px; text-align:center; color:#000000;">{{ count }}</span>
    </div>
  </div>

  <sc-if value="{{ order }}" hint-placeholder-val="{{ true }}">
    <div style="margin-top:auto; width:100%; height:80px; border-radius:16px; background:#FFFFFF; box-shadow:inset 0 0 0 2px #F04F5F; display:flex; align-items:center; justify-content:center;">
      <span style="font-weight:600; font-size:30px; letter-spacing:-0.01em; color:#F04F5F;">Order Now</span>
    </div>
  </sc-if>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:672,&quot;height&quot;:500},&quot;img&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;assets/chicken-biryani.png&quot;},&quot;dish&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Chicken Biryani&quot;},&quot;restaurant&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Charan Foods&quot;},&quot;time&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;30-35 mins&quot;},&quot;dist&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;1.2 Km&quot;},&quot;price&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;₹310&quot;},&quot;rating&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;4.3&quot;},&quot;tone&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;high&quot;,&quot;mid&quot;,&quot;low&quot;],&quot;default&quot;:&quot;high&quot;},&quot;count&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;by 1K+&quot;},&quot;order&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false}}">
class Component extends DCLogic {
  renderVals() {
    const p = this.props;
    const tone = p.tone ?? "high";
    const colors = { high: "#146039", mid: "#E8A317", low: "#B10003" };
    const c = colors[tone] ?? colors.high;
    const ratingEl = React.createElement("div", {
      style: { height: 52, borderRadius: 999, background: c, padding: "8px 16px 8px 8px", display: "flex", flexDirection: "row", gap: 8, alignItems: "center", boxSizing: "border-box" }
    },
      React.createElement("div", {
        style: { width: 36, height: 36, borderRadius: 999, background: "#fff", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }
      },
        React.createElement("svg", { width: 24, height: 24, viewBox: "0 0 24 24", style: { display: "block" } },
          React.createElement("path", { d: "M 4.59 24 L 6.54 15.126 L 0 9.158 L 8.64 8.368 L 12 0 L 15.36 8.368 L 24 9.158 L 17.46 15.126 L 19.41 24 L 12 19.295 L 4.59 24 Z", fill: c })
        )
      ),
      React.createElement("span", {
        style: { fontFamily: "Inter, sans-serif", fontWeight: 600, fontSize: 24, lineHeight: "32px", letterSpacing: "-0.01em", color: "#fff", whiteSpace: "nowrap" }
      }, p.rating ?? "4.3")
    );
    return {
      img: p.img ?? "assets/chicken-biryani.png",
      dish: p.dish ?? "Chicken Biryani",
      restaurant: p.restaurant ?? "Charan Foods",
      time: p.time ?? "30-35 mins",
      dist: p.dist ?? "1.2 Km",
      price: p.price ?? "₹310",
      count: p.count ?? "by 1K+",
      order: !!p.order,
      ratingEl
    };
  }
}
</script>
</body>
</html>
