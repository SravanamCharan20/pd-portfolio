<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support2.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
</helmet>

<div style="display:inline-flex; align-items:flex-start; gap:0; padding:36px 40px; background:#FFFFFF; font-family:'Inter',-apple-system,sans-serif;">

  <!-- ============ PANEL 1: SWIPE (REJECTED) ============ -->
  <div style="display:flex; flex-direction:column; align-items:center; width:240px;">
    <div style="position:relative; width:240px; height:420px; border-radius:24px; border:1.5px solid #E0E0E0; background:#FBF2F2; box-sizing:border-box; overflow:hidden;">
      <!-- wireframe content (dimmed) -->
      <div style="position:absolute; inset:0; padding:16px 14px; opacity:0.7;">
        <!-- header bar -->
        <div style="width:100%; height:32px; border-radius:6px; background:#EBEBEB;"></div>
        <!-- single card -->
        <div style="margin:30px auto 0; width:85%; border:1px solid #CCCCCC; border-radius:14px; background:#F8F8F8; padding:12px;">
          <div style="position:relative; width:100%; height:160px; border-radius:10px; background:#EBEBEB;">
            <div style="position:absolute; top:10px; right:10px; width:18px; height:18px; border-radius:50%; background:#DCDCDC;"></div>
          </div>
          <div style="height:9px; width:62%; border-radius:5px; background:#CFCFCF; margin-top:16px;"></div>
          <div style="height:8px; width:42%; border-radius:5px; background:#DADADA; margin-top:9px;"></div>
          <div style="height:8px; width:28%; border-radius:5px; background:#DADADA; margin-top:14px;"></div>
        </div>
        <!-- pagination dots -->
        <div style="display:flex; justify-content:center; gap:8px; margin-top:26px;">
          <div style="width:6px; height:6px; border-radius:50%; background:#CCCCCC;"></div>
          <div style="width:6px; height:6px; border-radius:50%; background:#CCCCCC;"></div>
          <div style="width:6px; height:6px; border-radius:50%; background:#CCCCCC;"></div>
          <div style="width:6px; height:6px; border-radius:50%; background:#CCCCCC;"></div>
          <div style="width:6px; height:6px; border-radius:50%; background:#CCCCCC;"></div>
        </div>
      </div>
      <!-- swipe arrows -->
      <div style="position:absolute; left:8px; top:172px; font-size:22px; line-height:1; color:#F04F5F; font-weight:600;">&#8592;</div>
      <div style="position:absolute; right:8px; top:172px; font-size:22px; line-height:1; color:#267E3E; font-weight:600;">&#8594;</div>
      <!-- rejection mark -->
      <div style="position:absolute; inset:0; display:flex; align-items:center; justify-content:center; pointer-events:none;">
        <span style="font-size:62px; line-height:1; color:#F04F5F; opacity:0.85; transform:rotate(-5deg); font-weight:400;">&#10005;</span>
      </div>
    </div>
    <!-- caption -->
    <div style="text-align:center; margin-top:14px;">
      <div style="font-size:14px; font-weight:600; color:#333333;">Swipe to pick</div>
      <div style="font-size:12px; font-weight:400; color:#F04F5F; margin-top:3px;">No stopping point.</div>
    </div>
  </div>

  <!-- progression arrow -->
  <div style="margin-top:200px; padding:0 12px; font-size:22px; color:#CCCCCC; line-height:1;">&#8594;</div>

  <!-- ============ PANEL 2: RANK (REJECTED) ============ -->
  <div style="display:flex; flex-direction:column; align-items:center; width:240px;">
    <div style="position:relative; width:240px; height:420px; border-radius:24px; border:1.5px solid #E0E0E0; background:#FBF2F2; box-sizing:border-box; overflow:hidden;">
      <div style="position:absolute; inset:0; padding:16px 14px; opacity:0.7;">
        <!-- header bar -->
        <div style="width:100%; height:32px; border-radius:6px; background:#EBEBEB;"></div>
        <!-- "Rank your top 5" line -->
        <div style="height:9px; width:55%; border-radius:5px; background:#CFCFCF; margin:14px auto 0;"></div>
        <!-- list + comparison overlay -->
        <div style="position:relative; margin-top:14px;">
          <!-- comparison curves -->
          <svg width="212" height="260" viewBox="0 0 212 260" style="position:absolute; left:0; top:0; pointer-events:none; opacity:0.3;">
            <g fill="none" stroke="#CCCCCC" stroke-width="1.2" stroke-dasharray="3 3">
              <path d="M188,26 Q150,52 188,78"></path>
              <path d="M188,26 Q112,78 188,130"></path>
              <path d="M188,26 Q74,104 188,182"></path>
              <path d="M188,26 Q36,130 188,234"></path>
              <path d="M188,78 Q150,104 188,130"></path>
              <path d="M188,78 Q112,130 188,182"></path>
              <path d="M188,78 Q74,156 188,234"></path>
              <path d="M188,130 Q150,156 188,182"></path>
              <path d="M188,130 Q112,182 188,234"></path>
              <path d="M188,182 Q150,208 188,234"></path>
            </g>
          </svg>
          <!-- row 1 -->
          <div style="display:flex; align-items:center; gap:10px; height:52px; border-bottom:1px solid #E6E6E6; padding:0 4px; position:relative;">
            <div style="display:flex; flex-direction:column; gap:3px; width:14px;"><div style="height:2px; background:#CCCCCC;"></div><div style="height:2px; background:#CCCCCC;"></div><div style="height:2px; background:#CCCCCC;"></div></div>
            <div style="flex:1; height:9px; border-radius:5px; background:#D6D6D6;"></div>
            <div style="width:22px; height:22px; border-radius:50%; border:1px solid #CCCCCC; display:flex; align-items:center; justify-content:center; font-size:11px; color:#999999; font-weight:500;">1</div>
          </div>
          <!-- row 2 -->
          <div style="display:flex; align-items:center; gap:10px; height:52px; border-bottom:1px solid #E6E6E6; padding:0 4px;">
            <div style="display:flex; flex-direction:column; gap:3px; width:14px;"><div style="height:2px; background:#CCCCCC;"></div><div style="height:2px; background:#CCCCCC;"></div><div style="height:2px; background:#CCCCCC;"></div></div>
            <div style="flex:1; height:9px; border-radius:5px; background:#D6D6D6;"></div>
            <div style="width:22px; height:22px; border-radius:50%; border:1px solid #CCCCCC; display:flex; align-items:center; justify-content:center; font-size:11px; color:#999999; font-weight:500;">2</div>
          </div>
          <!-- row 3 (being dragged) -->
          <div style="display:flex; align-items:center; gap:10px; height:52px; border-bottom:1px solid #E6E6E6; padding:0 4px; background:#FFFFFF; border-radius:8px; box-shadow:0 6px 14px rgba(0,0,0,0.12); transform:translateX(10px); position:relative; z-index:2;">
            <div style="display:flex; flex-direction:column; gap:3px; width:14px;"><div style="height:2px; background:#BBBBBB;"></div><div style="height:2px; background:#BBBBBB;"></div><div style="height:2px; background:#BBBBBB;"></div></div>
            <div style="flex:1; height:9px; border-radius:5px; background:#CACACA;"></div>
            <div style="width:22px; height:22px; border-radius:50%; border:1px solid #CCCCCC; display:flex; align-items:center; justify-content:center; font-size:11px; color:#999999; font-weight:500;">3</div>
          </div>
          <!-- row 4 -->
          <div style="display:flex; align-items:center; gap:10px; height:52px; border-bottom:1px solid #E6E6E6; padding:0 4px;">
            <div style="display:flex; flex-direction:column; gap:3px; width:14px;"><div style="height:2px; background:#CCCCCC;"></div><div style="height:2px; background:#CCCCCC;"></div><div style="height:2px; background:#CCCCCC;"></div></div>
            <div style="flex:1; height:9px; border-radius:5px; background:#D6D6D6;"></div>
            <div style="width:22px; height:22px; border-radius:50%; border:1px solid #CCCCCC; display:flex; align-items:center; justify-content:center; font-size:11px; color:#999999; font-weight:500;">4</div>
          </div>
          <!-- row 5 -->
          <div style="display:flex; align-items:center; gap:10px; height:52px; padding:0 4px;">
            <div style="display:flex; flex-direction:column; gap:3px; width:14px;"><div style="height:2px; background:#CCCCCC;"></div><div style="height:2px; background:#CCCCCC;"></div><div style="height:2px; background:#CCCCCC;"></div></div>
            <div style="flex:1; height:9px; border-radius:5px; background:#D6D6D6;"></div>
            <div style="width:22px; height:22px; border-radius:50%; border:1px solid #CCCCCC; display:flex; align-items:center; justify-content:center; font-size:11px; color:#999999; font-weight:500;">5</div>
          </div>
        </div>
      </div>
      <!-- rejection mark -->
      <div style="position:absolute; inset:0; display:flex; align-items:center; justify-content:center; pointer-events:none;">
        <span style="font-size:62px; line-height:1; color:#F04F5F; opacity:0.85; transform:rotate(-4deg); font-weight:400;">&#10005;</span>
      </div>
    </div>
    <div style="text-align:center; margin-top:14px;">
      <div style="font-size:14px; font-weight:600; color:#333333;">Drag to rank</div>
      <div style="font-size:12px; font-weight:400; color:#F04F5F; margin-top:3px;">10 mental comparisons.</div>
    </div>
  </div>

  <!-- progression arrow -->
  <div style="margin-top:200px; padding:0 12px; font-size:22px; color:#CCCCCC; line-height:1;">&#8594;</div>

  <!-- ============ PANEL 3: BINARY DUEL (CHOSEN) ============ -->
  <div style="display:flex; flex-direction:column; align-items:center; width:240px;">
    <div style="position:relative; width:240px; height:420px; border-radius:24px; border:2px solid #267E3E; background:#F1F8F2; box-sizing:border-box; overflow:hidden;">
      <div style="position:absolute; inset:0; padding:16px 14px;">
        <!-- header bar -->
        <div style="width:100%; height:32px; border-radius:6px; background:#EBEBEB;"></div>
        <!-- labels -->
        <div style="height:7px; width:32%; border-radius:4px; background:#CFCFCF; margin-top:12px;"></div>
        <div style="height:8px; width:48%; border-radius:5px; background:#D6D6D6; margin:8px auto 0;"></div>
        <!-- duel cards -->
        <div style="position:relative; margin-top:12px;">
          <!-- card A -->
          <div style="border:1px solid #CCCCCC; border-radius:12px; background:#F8F8F8; padding:9px;">
            <div style="position:relative; width:100%; height:96px; border-radius:8px; background:#EBEBEB;">
              <div style="position:absolute; top:8px; right:8px; width:16px; height:16px; border-radius:50%; background:#DCDCDC;"></div>
            </div>
            <div style="height:8px; width:58%; border-radius:5px; background:#CFCFCF; margin-top:10px;"></div>
            <div style="height:7px; width:40%; border-radius:4px; background:#DADADA; margin-top:7px;"></div>
          </div>
          <!-- VS badge (fully rendered) -->
          <div style="position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); width:36px; height:36px; border-radius:50%; background:#111111; display:flex; align-items:center; justify-content:center; z-index:3; box-shadow:0 2px 6px rgba(0,0,0,0.25);">
            <span style="color:#FFFFFF; font-size:11px; font-weight:800; letter-spacing:0.5px;">VS</span>
          </div>
          <!-- card B -->
          <div style="border:1px solid #CCCCCC; border-radius:12px; background:#F8F8F8; padding:9px; margin-top:10px;">
            <div style="position:relative; width:100%; height:96px; border-radius:8px; background:#EBEBEB;">
              <div style="position:absolute; top:8px; right:8px; width:16px; height:16px; border-radius:50%; background:#DCDCDC;"></div>
            </div>
            <div style="height:8px; width:46%; border-radius:5px; background:#CFCFCF; margin-top:10px;"></div>
            <div style="height:7px; width:52%; border-radius:4px; background:#DADADA; margin-top:7px;"></div>
          </div>
        </div>
        <!-- toss both -->
        <div style="height:8px; width:38%; border-radius:5px; background:#D6D6D6; margin:14px auto 0;"></div>
      </div>
      <!-- selection mark -->
      <div style="position:absolute; inset:0; display:flex; align-items:center; justify-content:center; pointer-events:none;">
        <span style="font-size:62px; line-height:1; color:#267E3E; opacity:0.9; transform:rotate(5deg); font-weight:400;">&#10003;</span>
      </div>
    </div>
    <div style="text-align:center; margin-top:14px;">
      <div style="font-size:14px; font-weight:600; color:#333333;">Pick one of two</div>
      <div style="font-size:12px; font-weight:400; color:#267E3E; margin-top:3px;">Just pick one.</div>
    </div>
  </div>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:840,&quot;height&quot;:540}}"></script>
</body>
</html>
